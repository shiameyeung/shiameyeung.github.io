<head>

    <title>楊　天楽 のホームページ</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 60px 20px;
        }

        h1 {
            font-size: 32px;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        p.subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 40px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            /* 稍微缩小了间距，让社交链接更紧凑 */
        }

        /* 提取通用的社交链接样式 */
        a.sns-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #24292e;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: color 0.3s, transform 0.2s;
        }

        a.sns-link:active {
            transform: scale(0.98);
        }

        /* 为每个平台设置专属的 Hover 品牌色 */
        a.github-link:hover {
            color: #0366d6;
        }

        a.instagram-link:hover {
            color: #E1306C;
        }

        a.jglobal-link:hover {
            color: #004098;
            /* JST 蓝色 */
        }

        a.wantedly-link:hover {
            color: #20bca3;
            /* Wantedly 标志性青绿色 */
        }

    </style>
</head>
